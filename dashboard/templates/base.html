<!DOCTYPE html>
<html>
<head>
    <title>Vulnerability Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #f4f7fb;
        }

        .navbar {
            background-color: #111827;
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .card-box {
            border-radius: 14px;
            padding: 20px;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .critical { background: #dc3545; }
        .high { background: #fd7e14; }
        .medium { background: #ffc107; color:black; }
        .low { background: #198754; }
        .repo { background: #0d6efd; }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <a class="navbar-brand" href="/">Vulnerabilities Dashboard</a>

    <div class="navbar-nav">
    	<a class="nav-link" href="/sourcecode/">Source Code</a>
    	<a class="nav-link" href="/docker/">Docker</a>
    	<a class="nav-link" href="/aws/">AWS</a>
    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</html>
